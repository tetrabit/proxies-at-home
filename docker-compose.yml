services:
  server:
    build:
      context: .
      dockerfile: server/dockerfile
      args:
        PRINTER_KEYSTONE_GIT_URL: ${PRINTER_KEYSTONE_GIT_URL-}
        PRINTER_KEYSTONE_GIT_REF: ${PRINTER_KEYSTONE_GIT_REF-main}
    environment:
      # Use the venv python that has PyMuPDF installed (and sees apk-installed cv2/numpy via --system-site-packages).
      - PRINTER_KEYSTONE_PYTHON=/opt/keystone-venv/bin/python
      - PRINTER_KEYSTONE_REPO=/opt/printer-keystone
    ports:
      - "3001:3001"
    volumes:
      - server-data:/app/server/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  server-data:
    driver: local
